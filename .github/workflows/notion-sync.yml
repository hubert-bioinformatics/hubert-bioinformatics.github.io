name: Notion to GitHub Pages

on:
  schedule:
    # 매일 UTC 15:00 (한국 시간 자정 00:00)에 자동 실행
    - cron: '0 15 * * *'
  workflow_dispatch: # Actions 탭에서 수동으로 'Run workflow' 버튼을 눌러 실행할 수 있도록 허용

jobs:
  notion-to-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 노션의 글과 이미지를 가져와서 마크다운으로 변환해주는 Action
      - name: notion-jam
        # You may pin to the exact commit or the version.
        # uses: victornpb/notion-jam@ef5134190977bdaffd87e396d5d27860a710c8db
        uses: victornpb/notion-jam@v0.0.13
        with:
          # 깃허브에서 자동 제공하는 토큰 사용 (추가 세팅 불필요)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # 우리가 아까 금고에 넣어둔 노션 열쇠들
          NOTION_SECRET: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE: ${{ secrets.NOTION_DATABASE_ID }}
          
          # 가져올 글 필터링 기준
          FILTER_PROP: '상태'
          FILTER_VALUES: 'Ready'
          PARALLEL_PAGES: '1'
          PARALLEL_DOWNLOADS_PER_PAGE: '1'
          
          # Jekyll 블로그 구조에 맞춘 파일 저장 경로 설정
          ARTICLE_PATH: '_posts/{date}-{title}.md'
          ASSETS_PATH: 'assets/img/post/'

      - name: Clean up Filename and Frontmatter (Python)
        run: |
          python3 -c '
          import os, re
          
          post_dir = "_posts"
          if not os.path.exists(post_dir):
              exit()
              
          for filename in os.listdir(post_dir):
              if not filename.endswith(".md"):
                  continue
                  
              filepath = os.path.join(post_dir, filename)
              with open(filepath, "r", encoding="utf-8") as f:
                  content = f.read()
              
              # 파일 안에서 순수 날짜(YYYY-MM-DD)와 제목 추출
              date_match = re.search(r"^date:\s*([0-9]{4}-[0-9]{2}-[0-9]{2})", content, re.MULTILINE)
              title_match = re.search(r"^title:\s*(.+)$", content, re.MULTILINE)
              
              if date_match and title_match:
                  date_str = date_match.group(1)
                  # 제목에서 띄어쓰기를 하이픈(-)으로 바꾸고 특수문자 제거
                  title_str = title_match.group(1).strip().strip("\"'\''").replace(" ", "-")
                  title_clean = re.sub(r"[^a-zA-Z0-9가-힣\-_]", "", title_str)
                  
                  new_filename = f"{date_str}-{title_clean}.md"
                  new_filepath = os.path.join(post_dir, new_filename)
                  
                  # 파일 내부 date 값을 yyyy-mm-dd 형식으로 덮어쓰기 (+0900 한국시간 기준 추가)
                  new_content = re.sub(r"^date:\s*.*$", f"date: {date_str} +0900", content, flags=re.MULTILINE)
                  
                  with open(filepath, "w", encoding="utf-8") as f:
                      f.write(new_content)
                  
                  # 파일명이 다를 경우 예쁜 이름으로 변경하고, 기존의 긴 이름 파일은 삭제 기록
                  if filename != new_filename:
                      os.rename(filepath, new_filepath)
                      os.system(f"git rm --cached \"{filepath}\" 2>/dev/null || true")
          '

      # 변경된 파일들을 GitHub에 반영 (삭제된 옛날 파일 내역까지 모두 포함)
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add --all _posts/ assets/ 2>/dev/null || true
          git commit -m "Auto-sync Notion posts to Blog" || echo "No changes to commit"
          git push
