name: Notion to GitHub Pages

on:
  schedule:
    # 매일 UTC 15:00 (한국 시간 자정 00:00)에 자동 실행
    - cron: '0 15 * * *'
  workflow_dispatch: # Actions 탭에서 수동으로 'Run workflow' 버튼을 눌러 실행할 수 있도록 허용

jobs:
  notion-to-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 노션의 글과 이미지를 가져와서 마크다운으로 변환해주는 Action
      - name: notion-jam
        # You may pin to the exact commit or the version.
        # uses: victornpb/notion-jam@ef5134190977bdaffd87e396d5d27860a710c8db
        uses: victornpb/notion-jam@v0.0.13
        with:
          # 깃허브에서 자동 제공하는 토큰 사용 (추가 세팅 불필요)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # 우리가 아까 금고에 넣어둔 노션 열쇠들
          NOTION_SECRET: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE: ${{ secrets.NOTION_DATABASE_ID }}
          
          # 가져올 글 필터링 기준
          FILTER_PROP: '상태'
          FILTER_VALUES: 'Ready'
          PARALLEL_PAGES: '1'
          PARALLEL_DOWNLOADS_PER_PAGE: '1'
          
          # Jekyll 블로그 구조에 맞춘 파일 저장 경로 설정
          ARTICLE_PATH: '_posts/{date}-{title}.md'
          ASSETS_PATH: 'assets/img/post/'

      - name: Clean up Filename and Frontmatter
        run: |
          if [ -d "_posts" ]; then
            cd _posts
            for file in *.md; do
              # 파일이 없으면 건너뜀
              [ -e "$file" ] || continue
              
              # 1. 파일 내부의 Front Matter 날짜 형식 깔끔하게 정리 (시간 부분 절삭)
              # date: 2026-07-03T00:00:00.000Z 같은 형태를 date: 2026-07-03 으로 덮어씀
              sed -i -E 's/^(date: [0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/' "$file"
              
              # 2. 이미 yyyy-mm-dd- 형식으로 되어 있는 파일(기존 글)은 건너뜀
              if [[ "$file" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2} ]]; then
                continue
              fi
              
              # 3. 파일 내부에서 깔끔해진 yyyy-mm-dd 날짜를 다시 추출
              post_date=$(grep -m 1 "^date:" "$file" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
              
              # 4. 날짜를 성공적으로 찾았다면, 파일명 앞에 날짜를 붙여서 최종 이름 변경
              if [ -n "$post_date" ]; then
                mv "$file" "${post_date}-${file}"
              fi
            done
          fi

      # 변환된 마크다운 파일(_posts/)과 다운로드된 이미지(assets/)를 GitHub에 커밋 및 푸시
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경된 파일들을 스테이징
          git add _posts/ assets/ 2>/dev/null || true
          
          # 커밋할 내용이 있으면 커밋하고, 없으면 에러 없이 넘기기
          git commit -m "Auto-sync Notion posts to Blog" || echo "No changes to commit"
          
          # 저장소에 푸시하여 실제 반영
          git push
